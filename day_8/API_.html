<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch api</title>
</head>
<body>

<button id="loadBtn">Load Users</button>

<ul id="userList"></ul>

<script>
const btn = document.querySelector("#loadBtn")
const list = document.querySelector("#userList")

btn.addEventListener("click", loadUsers)

async function loadUsers(){

    const response = await fetch("https://jsonplaceholder.typicode.com/users")

    const data = await response.json()

    console.log(data)

    data.forEach(function(user){
        const li = document.createElement("li")
        li.textContent = `ID: ${user.id}, Name: ${user.name}, Username: ${user.username}, Email: ${user.email}, Phone: ${user.phone}, Website: ${user.website}, Company: ${user.company.name}`
        list.appendChild(li)
    })

}
</script>

</body>
</html>
